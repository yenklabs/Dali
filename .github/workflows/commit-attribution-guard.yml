name: Commit Attribution Guard

# Enforces three rules:
#   1. Every commit must have a real human author (name + email required).
#   2. No Co-authored-by trailers — single-author commits only.
#   3. Reject automated agent author identities (generic bot signals only).

on:
  pull_request:
  push:

jobs:
  enforce-attribution:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check author identity and reject co-author trailers
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          zero_sha='0000000000000000000000000000000000000000'
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            range="${PR_BASE_SHA}..${PR_HEAD_SHA}"
          elif [[ -n "${PUSH_BEFORE_SHA:-}" && "$PUSH_BEFORE_SHA" != "$zero_sha" ]]; then
            range="${PUSH_BEFORE_SHA}..${CURRENT_SHA}"
          else
            range="${CURRENT_SHA}^!"
          fi

          echo "Inspecting commit range: $range"

          commit_list="$(git rev-list "$range" || true)"
          if [[ -z "$commit_list" ]]; then
            echo "No commits to inspect."
            exit 0
          fi

          failures=0
          for commit_sha in $commit_list; do
            author_name="$(git show -s --format='%an' "$commit_sha")"
            author_email="$(git show -s --format='%ae' "$commit_sha")"
            commit_subject="$(git show -s --format='%s' "$commit_sha")"
            commit_body="$(git show -s --format='%B' "$commit_sha")"

            # Rule 1: Author name and email must be non-empty.
            if [[ -z "$author_name" || -z "$author_email" ]]; then
              echo "::error::Commit $commit_sha ($commit_subject) is missing author name or email. All commits require a real human author identity."
              failures=1
            fi

            # Rule 2: Reject all Co-authored-by trailers (single-author commits only).
            while IFS= read -r line; do
              if echo "$line" | grep -Eiq '^Co-authored-by:'; then
                echo "::error::Commit $commit_sha ($commit_subject) contains a Co-authored-by trailer: '$line'. This repository does not allow co-author trailers."
                failures=1
              fi
            done <<< "$commit_body"

            # Rule 3: Reject automated agent author identities (generic bot signals).
            if echo "$author_name" | grep -Eiq '\[bot\]|^bot | bots$'; then
              echo "::error::Commit $commit_sha ($commit_subject) has an automated agent author name ($author_name)."
              failures=1
            fi
            if echo "$author_email" | grep -Eiq '\.bot@|\[bot\]@'; then
              echo "::error::Commit $commit_sha ($commit_subject) has an automated agent author email ($author_email)."
              failures=1
            fi
          done

          if [[ "$failures" -ne 0 ]]; then
            echo "::error::Attribution policy violation(s) detected. See errors above."
            exit 1
          fi

          echo "Attribution check passed."
